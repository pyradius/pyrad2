site_name: pyrad2
theme:
  name: material
  logo: logo.png
  favicon: favicon.ico
  features:
    - content.code.copy
    - navigation.expand
    
nav:
  - Home: index.md
  - Getting Started: setup.md
  - Guides:
    - Running a RADIUS Server: server.md
    - Making RADIUS Requests: client.md
    - Authentication Methods: auth.md
    - Dictionary Reference: dictionary.md
    - FreeRADIUS Conformance: conformance.md
  - Migrating from pyrad: compatibility.md
  - API Reference:
      - server: api/server.md
      - server_async: api/server_async.md
      - client: api/client.md
      - client_async: api/client_async.md
      - radsec:
        - Server: api/radsec_server.md
        - Client: api/radsec_client.md
        - RADIUS/1.1 (RFC 9765): api/radius11.md
      - packet: api/packet.md
      - dedup: api/dedup.md
      - dictionary: api/dictionary.md
      - host: api/host.md
      - tools: api/tools.md
      - dictfile: api/dictfile.md
      - proxy: api/proxy.md
      - bidict: api/bidict.md
      - constants: api/constants.md
      - exceptions: api/exceptions.md
      - eap: api/eap.md
      - chap: api/chap.md
      - mschap: api/mschap.md
      - retry: api/retry.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            members_order: source
